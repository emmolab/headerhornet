services:
  headerhornet:
    container_name: ${HEADERHORNET_CONTAINER_NAME:-headerhornet}
    image: ${HEADERHORNET_IMAGE:-ghcr.io/emmolab/headerhornet:latest}
    build:
      context: .
    restart: unless-stopped
    ports:
      - "${HEADERHORNET_HOST:-127.0.0.1}:${HEADERHORNET_HOST_PORT:-8080}:${HEADERHORNET_CONTAINER_PORT:-8080}"
    command:
      - "-p"
      - "${HEADERHORNET_CONTAINER_PORT:-8080}"
    environment:
      HEADERHORNET_DEBUG: ${HEADERHORNET_DEBUG:-0}
      HEADERHORNET_API_KEY: ${HEADERHORNET_API_KEY:-}
      HEADERHORNET_LOG_API_REQUESTS: ${HEADERHORNET_LOG_API_REQUESTS:-0}
      HEADERHORNET_LOG_API_REQUEST_BODY: ${HEADERHORNET_LOG_API_REQUEST_BODY:-0}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${HEADERHORNET_CONTAINER_PORT:-8080}/api/v1/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
